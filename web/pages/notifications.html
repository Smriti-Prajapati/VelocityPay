<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications — VelocityPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="../static/css/velocitypay.css" rel="stylesheet"/>
</head>
<body>
<div class="app-root">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">Velocity<em>Pay</em></div>
  <nav style="padding:12px 0">
    <a class="nav-link" href="dashboard.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-link" href="wallet.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><circle cx="12" cy="14" r="2"/></svg>Wallet</a>
    <a class="nav-link" href="send.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Send Money</a>
    <a class="nav-link" href="transactions.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/><polyline points="3 3 3 11 11 11"/></svg>Transactions</a>
    <a class="nav-link active" href="notifications.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Notifications</a>
    <a class="nav-link" href="analytics.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>Analytics</a>
    <a class="nav-link" href="profile.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
  </nav>
  <div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-avatar" data-user-avatar></div><div><div class="sidebar-user-name" data-user-name></div></div></div><a href="#" onclick="Api.logout()" style="display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.3);font-size:13px;margin-top:14px;text-decoration:none"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out</a></div>
</aside>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:12px"><button class="hamburger" id="hamburger"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="topbar-title">Notifications</span></div>
    <div class="topbar-right">
      <button class="btn-ghost btn-sm" id="markAllBtn" onclick="markAll()">Mark all read</button>
      <div class="top-avatar" data-user-avatar onclick="location.href='profile.html'"></div>
    </div>
  </header>
  <main class="page">
    <div style="max-width:680px;margin:0 auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div style="font-size:15px;font-weight:700"><span id="unreadCount" style="background:var(--primary);color:#fff;border-radius:999px;padding:2px 10px;font-size:13px;margin-right:8px">0</span>unread</div>
      </div>
      <div class="card"><div class="card-body" id="notifList" style="padding-top:8px;padding-bottom:8px"><div style="text-align:center;padding:40px;color:var(--sub)">Loading…</div></div></div>
    </div>
  </main>
</div>
</div>

<script src="../static/js/api.js"></script>
<script src="../static/js/utils.js"></script>
<script>
if (!Api.requireAuth()) {}

const typeConfig = {
  transaction_sent:     { bg:'rgba(192,57,43,.1)',  color:'#C0392B', icon:'<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>' },
  transaction_received: { bg:'rgba(45,106,79,.1)',  color:'#2D6A4F', icon:'<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="17" y1="7" x2="7" y2="17"/><polyline points="17 17 7 17 7 7"/></svg>' },
  transaction_failed:   { bg:'rgba(192,57,43,.1)',  color:'#C0392B', icon:'<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' },
  refund_requested:     { bg:'rgba(183,121,31,.1)', color:'#B7791F', icon:'<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>' },
  refund_completed:     { bg:'rgba(45,106,79,.1)',  color:'#2D6A4F', icon:'<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' },
  wallet_created:       { bg:'rgba(139,94,60,.1)',  color:'#8B5E3C', icon:'<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>' },
  user_welcome:         { bg:'rgba(139,94,60,.1)',  color:'#8B5E3C', icon:'<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>' },
};

async function load() {
  const container = document.getElementById('notifList');
  try {
    const data = await Api.getNotifications();
    document.getElementById('unreadCount').textContent = data.unread_count || 0;
    const notifs = data.notifications || [];
    if (!notifs.length) { container.innerHTML = '<div style="text-align:center;padding:48px;color:var(--sub)">No notifications yet</div>'; return; }
    container.innerHTML = notifs.map(n => {
      const cfg = typeConfig[n.type] || { bg:'rgba(139,94,60,.1)', color:'#8B5E3C', icon:'' };
      return `<div class="notif-item" style="${!n.is_read?'background:rgba(139,94,60,.03)':''}">
        <div class="notif-icon-wrap" style="background:${cfg.bg};color:${cfg.color}">${cfg.icon}</div>
        <div class="notif-content">
          <div class="notif-title">${n.title}${!n.is_read?` <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-left:6px;vertical-align:middle"></span>`:''}</div>
          <div class="notif-msg">${n.message}</div>
          <div class="notif-time">${timeAgo(n.created_at)}</div>
        </div>
        ${!n.is_read?`<button onclick="markOne('${n.id}')" style="background:none;border:none;font-size:12px;font-weight:600;color:var(--primary);cursor:pointer;white-space:nowrap;padding:4px 8px">Mark read</button>`:''}
      </div>`;
    }).join('');
  } catch(e) { container.innerHTML = '<div style="text-align:center;padding:48px;color:var(--sub)">No notifications yet</div>'; }
}

async function markOne(id) { try { await Api.markRead(id); load(); } catch { /* silent */ } }

async function markAll() {
  const btn = document.getElementById('markAllBtn');
  showLoader(btn);
  try { await Api.markAllRead(); showToast('All notifications marked as read','success'); load(); }
  catch { /* fail silently */ } finally { hideLoader(btn); }
}
load();
</script>
</body>
</html>
