<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Send Money — VelocityPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="../static/css/velocitypay.css" rel="stylesheet"/>
</head>
<body>
<div class="app-root">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">Velocity<em>Pay</em></div>
  <nav class="sidebar-nav">
    <a class="nav-link" href="dashboard.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-link" href="wallet.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><circle cx="12" cy="14" r="2"/></svg>Wallet</a>
    <a class="nav-link active" href="send.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Send Money</a>
    <a class="nav-link" href="transactions.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/><polyline points="3 3 3 11 11 11"/></svg>Transactions</a>
    <a class="nav-link" href="notifications.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Notifications</a>
    <a class="nav-link" href="analytics.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>Analytics</a>
    <a class="nav-link" href="profile.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
  </nav>
  <div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-avatar" data-user-avatar></div><div><div class="sidebar-user-name" data-user-name></div></div></div><a href="#" onclick="Api.logout()" class="sidebar-signout"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out</a></div>
</aside>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="main">
  <header class="topbar">
    <div class="topbar-left"><button class="hamburger" id="hamburger"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="topbar-title">Send Money</span></div>
    <div class="topbar-right"><div class="top-avatar" data-user-avatar onclick="location.href='profile.html'"></div></div>
  </header>
  <main class="page">
    <div class="send-form-wrap">
      <!-- Balance chip -->
      <div class="balance-chip">
        <span class="balance-chip-label">Available balance</span>
        <span class="balance-chip-value" id="availBalance">Loading…</span>
      </div>

      <div class="card">
        <div class="card-header">Transfer Details</div>
        <div class="card-body">
          <form id="sendForm" novalidate>
            <div class="form-group">
              <label class="form-label">Recipient Wallet Number</label>
              <div class="input-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
                <input type="text" id="walletNum" placeholder="e.g. VPY123456789" required/>
              </div>
              <div class="send-field-hint">Ask your recipient for their VelocityPay wallet number.</div>
            </div>
            <div class="form-group">
              <label class="form-label">Amount</label>
              <div class="input-wrap">
                <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;font-weight:700;color:var(--sub);pointer-events:none">₹</span>
                <input type="number" id="amount" placeholder="0.00" min="1" step="0.01" required/>
              </div>
              <div class="quick-amount-row">
                <button type="button" onclick="document.getElementById('amount').value=100" class="quick-amount-btn">₹100</button>
                <button type="button" onclick="document.getElementById('amount').value=500" class="quick-amount-btn">₹500</button>
                <button type="button" onclick="document.getElementById('amount').value=1000" class="quick-amount-btn">₹1,000</button>
                <button type="button" onclick="document.getElementById('amount').value=5000" class="quick-amount-btn">₹5,000</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Notes <span class="optional-label">(optional)</span></label>
              <textarea id="notes" rows="2" placeholder="What's this for?"></textarea>
            </div>
            <div class="form-error" id="sendErr"></div>
            <button type="submit" class="btn-primary btn-full" id="sendBtn">Send Money</button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Success modal -->
<div class="modal-overlay" id="successModal">
  <div class="modal-box" style="text-align:center">
    <div class="success-icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
    <div class="modal-title">Transfer Successful</div>
    <p class="modal-desc">Your money has been sent.</p>
    <div class="success-receipt">
      <div class="receipt-row"><span class="receipt-label">Amount</span><span class="receipt-value" id="succAmt"></span></div>
      <div class="receipt-row"><span class="receipt-label">Recipient</span><span class="receipt-value-sm" id="succWallet"></span></div>
    </div>
    <div class="modal-actions-row">
      <button class="btn-ghost" onclick="location.href='transactions.html'">View History</button>
      <button class="btn-primary" onclick="closeSuccess()">Send Again</button>
    </div>
  </div>
</div>
</div>

<script src="../static/js/api.js"></script>
<script src="../static/js/utils.js"></script>
<script>
if (!Api.requireAuth()) {}
Api.getBalance().then(w => document.getElementById('availBalance').textContent = formatMoney(w.balance, w.currency||'INR')).catch(() => {});

document.getElementById('sendForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('sendBtn');
  const err = document.getElementById('sendErr');
  err.classList.remove('show');
  const wn = document.getElementById('walletNum').value.trim();
  const am = parseFloat(document.getElementById('amount').value);
  const notes = document.getElementById('notes').value.trim();
  if (!wn) { err.textContent='Wallet number is required.'; err.classList.add('show'); return; }
  if (!am||am<=0) { err.textContent='Enter a valid amount.'; err.classList.add('show'); return; }
  showLoader(btn);
  try {
    await Api.transfer({ receiver_wallet_number: wn, amount: am, notes: notes||undefined, idempotency_key: crypto.randomUUID() });
    document.getElementById('succAmt').textContent = formatMoney(am);
    document.getElementById('succWallet').textContent = wn;
    document.getElementById('successModal').classList.add('open');
    Api.getBalance().then(w => document.getElementById('availBalance').textContent = formatMoney(w.balance, w.currency||'INR')).catch(()=>{});
  } catch(e) { err.textContent=e.message; err.classList.add('show'); } finally { hideLoader(btn); }
});

function closeSuccess() {
  document.getElementById('successModal').classList.remove('open');
  document.getElementById('sendForm').reset();
}
</script>
</body>
</html>
